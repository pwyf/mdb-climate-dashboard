<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- leaf body, tilted ~45°, tip upper-right, base lower-left -->
  <path d="M 370 55
           C 455 55 475 140 458 230
           C 440 320 370 400 280 428
           C 190 456 100 428 82 355
           C 64 282 118 175 205 122
           C 265 86 305 55 370 55 Z"
        fill="#66BB6A" stroke="#2E7D32" stroke-width="26" stroke-linejoin="round"/>
  <!-- stem curves away lower-left -->
  <path d="M 105 368 Q 72 430 52 488"
        fill="none" stroke="#2E7D32" stroke-width="26" stroke-linecap="round"/>
  <!-- central vein tip → base -->
  <path d="M 358 78 Q 230 235 128 368"
        fill="none" stroke="#2E7D32" stroke-width="17" stroke-linecap="round"/>
  <!-- upper branch vein -->
  <path d="M 298 158 Q 258 195 218 212"
        fill="none" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
  <!-- lower branch vein -->
  <path d="M 218 278 Q 178 305 152 318"
        fill="none" stroke="#2E7D32" stroke-width="14" stroke-linecap="round"/>
</svg>
